<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MC Escher's Spirals</title>
        <style>
            body { margin: 0; }

            #spirals {
                position: absolute;
                width: 100vw;
                height: 100vh;
            }

            .container {
                display: grid;
                place-items: center;
                width: 100vw;
                height: 100vh;
            }

            .container ul {
                list-style-type: none
            }

            #intro {
                position: absolute;
                display: grid;
                place-items: center;
                width: 100vw;
                height: 100vh;
                background-color: rgba(0, 0, 0, 0.5);
                color: #ffffff;
            }

            #mce {
                position: absolute;
                bottom: 12%;
                right: 12%;
                height: 28px;
                animation: fadeIn 3s infinite alternate ease-in-out;    
            }

            @keyframes fadeIn {
                from { opacity: .2; }
                to { opacity: .8; }
            }

            @media (max-width: 1320px) {
                #mce {
                    height: 14px;
                }
            }

            .emoji {
                display: inline-block;
            }
            
            .emoji-poke {
                animation: bounce 0.6s infinite alternate ease-in-out;
            }

            @keyframes bounce {
                from { transform: translateX(0); }
                to { transform: translateX(-10px); }
            }

            .emoji-pinch {
                animation: pinch 0.6s infinite alternate ease-in-out;
            }

            @keyframes pinch {
                from { transform: scaleY(1); }
                to { transform: scaleY(.5); }
            }

            @keyframes swipe {
                from { transform: translateY(0px); }
                to { transform: translateY(10px); }
            }

            .swipe-container {
                height: 2em; 
                animation: swipe 0.6s infinite alternate ease-in-out;
            }

            .swipe-bullet div{
                display: inline-block;
            }
        </style>
      <script type="module" crossorigin src="assets/index-BmHxZGNr.js"></script>
    </head>
    <body>
        <div class="container">
            <canvas id="spirals"></canvas>
            <a href="https://www.nga.gov/artworks/54257-spirals">
                <img id="mce" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACUAAAANCAQAAACEaG/TAAAAAXNSR0IArs4c6QAAAFVJREFUKJGtkzEOACAIA4H4/y/jYAg6ICjtRCw5KlFWJZR2VFRH/ee5wDKR1PNkGr8ZfCBzE2UARxZQ2YXNL6BsfgRevipgV6b2rlxyt18EfKKM+4MTkakgD/FSH8gAAAAASUVORK5CYII="/>
            </a>
            <div id="intro">
                <div class="elements">
                    <h1>Touch the art!</h1>
                    <ul>
                        <li><span class="emoji emoji-poke">👉</span> Poke it</li>
                        <li><span class="emoji emoji-pinch">🤏</span> Pinch it</li>
                        <li class="swipe-bullet">
                            <div class="swipe-container">
                                <span class="emoji emoji-swipe">👋</span>
                            </div>
                            <span>Swipe it</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <script>
            document.getElementById('intro').addEventListener(
                'pointerdown',
                () => { document.getElementById('intro').style.display = 'none'; }
            );
        </script>
    </body>
</html>
